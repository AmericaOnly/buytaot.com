<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TAOT | CoinMarketCap</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        color: #f8fbff;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(239, 64, 86, 0.28), transparent 28rem),
          radial-gradient(circle at 82% 20%, rgba(52, 125, 255, 0.26), transparent 30rem),
          linear-gradient(145deg, #050813 0%, #09142a 48%, #120914 100%);
      }

      main {
        display: grid;
        width: min(1120px, calc(100vw - 32px));
        gap: 22px;
        padding: 40px 0;
      }

      h1 {
        margin: 0;
        padding: 24px;
        font-size: clamp(2.5rem, 9vw, 7rem);
        line-height: 0.95;
        text-align: center;
        text-shadow: 0 0 42px rgba(52, 125, 255, 0.24), 0 0 26px rgba(239, 64, 86, 0.18);
      }

      .widget-stack {
        display: grid;
        gap: 18px;
        width: 100%;
      }

      .widget-card {
        overflow: hidden;
        min-height: 90px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 20px;
        background: rgba(8, 17, 35, 0.78);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(18px);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Thanks Team Coinmarketcap!</h1>
      <div class="widget-stack" aria-label="TAOT CoinMarketCap widgets">
        <div class="widget-card">
          <script type="text/javascript" src="https://files.coinmarketcap.com/static/widget/coinMarquee.js"></script>
          <div id="coinmarketcap-widget-marquee" coins="40819" currency="USD" theme="dark" transparent="false" show-symbol-logo="true"></div>
        </div>
        <div class="widget-card">
          <script type="text/javascript" src="https://files.coinmarketcap.com/static/widget/currency.js"></script>
          <div class="coinmarketcap-currency-widget" data-currencyid="40819" data-base="USD" data-secondary="" data-ticker="true" data-rank="true" data-marketcap="false" data-volume="true" data-statsticker="true" data-stats="USD"></div>
        </div>
        <div class="widget-card">
          <script type="text/javascript" src="https://files.coinmarketcap.com/static/widget/coinPriceBlock.js"></script>
          <div id="coinmarketcap-widget-coin-price-block" coins="40819" currency="USD" theme="dark" transparent="false" show-symbol-logo="true"></div>
        </div>
      </div>
    </main>
  </body>
</html>
