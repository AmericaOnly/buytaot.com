<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TAOT | CoinMarketCap</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        color: #f8fbff;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(239, 64, 86, 0.28), transparent 28rem),
          radial-gradient(circle at 82% 20%, rgba(52, 125, 255, 0.26), transparent 30rem),
          linear-gradient(145deg, #050813 0%, #09142a 48%, #120914 100%);
      }

      main {
        display: grid;
        gap: 18px;
      }

      h1 {
        margin: 0;
        padding: 24px;
        font-size: clamp(2.5rem, 9vw, 7rem);
        line-height: 0.95;
        text-align: center;
        text-shadow: 0 0 42px rgba(52, 125, 255, 0.24), 0 0 26px rgba(239, 64, 86, 0.18);
      }

      p {
        margin: 0;
        color: #dbeafe;
        font-size: clamp(1.2rem, 4vw, 2rem);
        font-weight: 800;
        text-shadow: 0 0 24px rgba(255, 255, 255, 0.16);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Thanks Team Coinmarketcap!</h1>
      <p>proceed with CMCP</p>
    </main>
  </body>
</html>
